name: Weekly Job Matcher Cron

on:
  schedule:
    # Corre todos los lunes a las 09:00 UTC (06:00 AM Argentina)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  run-matcher:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Run Job Matcher
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      run: |
        python src/scripts/weekly_job_matcher.py
